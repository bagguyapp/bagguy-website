<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <!-- Skin gradient -->
    <radialGradient id="skinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcb8e"/>
      <stop offset="100%" stop-color="#e8965a"/>
    </radialGradient>
    <!-- Skin body -->
    <radialGradient id="skinBody" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffcb8e"/>
      <stop offset="100%" stop-color="#d97f3c"/>
    </radialGradient>
    <!-- Shirt gradient -->
    <radialGradient id="shirtGrad" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </radialGradient>
    <!-- Bag gradient -->
    <radialGradient id="bagGrad" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#26d0a0"/>
      <stop offset="100%" stop-color="#00897b"/>
    </radialGradient>
    <!-- Eye white grad -->
    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#e0e8f0"/>
    </radialGradient>
    <!-- Teal glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <!-- Subtle ground shadow -->
  <ellipse cx="256" cy="430" rx="120" ry="18" fill="black" opacity="0.25"/>

  <!-- ── LEGS ── -->
  <!-- Left leg -->
  <path d="M210 355 Q202 395 194 425" stroke="url(#skinBody)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <!-- Right leg -->
  <path d="M265 355 Q273 395 281 425" stroke="url(#skinBody)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <!-- Left shoe -->
  <ellipse cx="188" cy="428" rx="28" ry="13" fill="#1a1a2e" transform="rotate(-8 188 428)"/>
  <ellipse cx="178" cy="424" rx="12" ry="9" fill="#2d2d4e" transform="rotate(-8 178 424)"/>
  <!-- Right shoe -->
  <ellipse cx="286" cy="428" rx="28" ry="13" fill="#1a1a2e" transform="rotate(8 286 428)"/>
  <ellipse cx="296" cy="424" rx="12" ry="9" fill="#2d2d4e" transform="rotate(8 296 424)"/>

  <!-- ── SHIRT / TORSO ── -->
  <path d="M185 265 Q175 310 178 360 Q218 375 256 374 Q294 375 334 360 Q337 310 327 265 Q295 248 256 248 Q217 248 185 265Z" fill="url(#shirtGrad)" filter="url(#softShadow)"/>
  <!-- Shirt highlight -->
  <path d="M200 268 Q195 300 196 330" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Collar V -->
  <path d="M238 255 L256 280 L274 255" fill="#81d4fa" stroke="#4fc3f7" stroke-width="2"/>

  <!-- ── LEFT ARM (raised, holding bag) ── -->
  <path d="M188 285 Q155 265 128 240" stroke="url(#skinBody)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="118" cy="233" r="20" fill="url(#skinGrad)"/>
  <!-- Knuckle lines -->
  <path d="M108 228 Q118 222 128 228" stroke="#d97f3c" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ── RIGHT ARM (relaxed, slightly out) ── -->
  <path d="M324 285 Q348 315 355 345" stroke="url(#skinBody)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="358" cy="355" r="20" fill="url(#skinGrad)"/>

  <!-- ── NECK ── -->
  <path d="M236 232 Q240 248 240 258 L272 258 Q272 248 276 232Z" fill="url(#skinGrad)"/>

  <!-- ── HEAD ── -->
  <!-- Head shadow -->
  <ellipse cx="258" cy="178" rx="74" ry="78" fill="#c07030" opacity="0.3" transform="translate(4,6)"/>
  <!-- Main head -->
  <ellipse cx="256" cy="174" rx="74" ry="78" fill="url(#skinGrad)" filter="url(#softShadow)"/>
  <!-- Cheek blush left -->
  <ellipse cx="200" cy="195" rx="20" ry="12" fill="#ff8a65" opacity="0.35"/>
  <!-- Cheek blush right -->
  <ellipse cx="312" cy="195" rx="20" ry="12" fill="#ff8a65" opacity="0.35"/>
  <!-- Head highlight -->
  <ellipse cx="234" cy="142" rx="26" ry="18" fill="white" opacity="0.18" transform="rotate(-20 234 142)"/>

  <!-- ── HAIR ── -->
  <!-- Hair base -->
  <path d="M186 158 Q190 98 256 92 Q322 98 326 158 Q310 128 256 124 Q202 128 186 158Z" fill="#3d2314"/>
  <!-- Hair tuft on top -->
  <path d="M244 95 Q250 78 256 74 Q262 78 268 95" fill="#3d2314"/>
  <!-- Hair shine -->
  <path d="M220 110 Q234 102 248 108" stroke="#6d4226" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ── EARS ── -->
  <ellipse cx="182" cy="180" rx="14" ry="18" fill="#e8965a"/>
  <ellipse cx="182" cy="180" rx="8" ry="11" fill="#d4754a"/>
  <ellipse cx="330" cy="180" rx="14" ry="18" fill="#e8965a"/>
  <ellipse cx="330" cy="180" rx="8" ry="11" fill="#d4754a"/>

  <!-- ── EYES ── -->
  <!-- Eye whites (big, expressive) -->
  <ellipse cx="228" cy="172" rx="20" ry="22" fill="url(#eyeGrad)"/>
  <ellipse cx="284" cy="172" rx="20" ry="22" fill="url(#eyeGrad)"/>
  <!-- Irises (warm brown) -->
  <ellipse cx="230" cy="174" rx="13" ry="14" fill="#5d3a1a"/>
  <ellipse cx="286" cy="174" rx="13" ry="14" fill="#5d3a1a"/>
  <!-- Pupils -->
  <circle cx="231" cy="175" r="8" fill="#1a0a00"/>
  <circle cx="287" cy="175" r="8" fill="#1a0a00"/>
  <!-- Eye shine (Pixar sparkle) -->
  <circle cx="224" cy="168" r="5" fill="white"/>
  <circle cx="226" cy="175" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="280" cy="168" r="5" fill="white"/>
  <circle cx="282" cy="175" r="2.5" fill="white" opacity="0.7"/>
  <!-- Eyelashes / top lid -->
  <path d="M208 160 Q228 152 248 160" stroke="#2d1200" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M264 160 Q284 152 304 160" stroke="#2d1200" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ── EYEBROWS (expressive) ── -->
  <path d="M207 152 Q227 143 248 149" stroke="#3d2314" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M264 149 Q284 143 304 152" stroke="#3d2314" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ── NOSE ── -->
  <path d="M252 188 Q248 200 256 204 Q264 200 260 188" fill="#d4754a" opacity="0.8"/>
  <circle cx="250" cy="202" r="5" fill="#c06030" opacity="0.5"/>
  <circle cx="262" cy="202" r="5" fill="#c06030" opacity="0.5"/>

  <!-- ── BIG SMILE ── -->
  <path d="M220 218 Q256 248 292 218" stroke="#3d1a00" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M224 220 Q256 244 288 220 Q256 232 224 220Z" fill="white" opacity="0.9"/>

  <!-- ── SHOPPING BAG ── -->
  <!-- Bag shadow -->
  <rect x="52" y="208" width="90" height="102" rx="16" fill="black" opacity="0.2" transform="translate(4,6)"/>
  <!-- Bag body -->
  <rect x="50" y="204" width="90" height="102" rx="16" fill="url(#bagGrad)" filter="url(#softShadow)"/>
  <!-- Bag shine panel -->
  <rect x="62" y="216" width="24" height="60" rx="10" fill="white" opacity="0.22"/>
  <!-- Bag crease line -->
  <line x1="95" y1="210" x2="95" y2="300" stroke="#00695c" stroke-width="2" opacity="0.5"/>
  <!-- Bag top fold -->
  <rect x="50" y="200" width="90" height="18" rx="8" fill="#00897b"/>
  <!-- Handles -->
  <path d="M72 200 Q76 172 88 170 Q100 172 104 200" stroke="#00695c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Dollar sign -->
  <text x="95" y="275" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="white" text-anchor="middle" opacity="0.95" filter="url(#softShadow)">$</text>

  <!-- ── GLOW RING ── -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00d4aa" stroke-width="5" opacity="0.5" filter="url(#glow)"/>

  <!-- ── BGT TEXT ── -->
  <text x="256" y="480" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#00d4aa" text-anchor="middle" letter-spacing="8" filter="url(#glow)">BGT</text>
</svg>
