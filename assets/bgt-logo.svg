<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="240" fill="#16213e"/>
  
  <!-- Glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00d4aa" stroke-width="4" opacity="0.6"/>

  <!-- ── Body ── -->
  <!-- Legs -->
  <line x1="220" y1="350" x2="200" y2="420" stroke="#f4a261" stroke-width="18" stroke-linecap="round"/>
  <line x1="265" y1="350" x2="285" y2="420" stroke="#f4a261" stroke-width="18" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="196" cy="424" rx="20" ry="10" fill="#2d3436" transform="rotate(-10 196 424)"/>
  <ellipse cx="289" cy="424" rx="20" ry="10" fill="#2d3436" transform="rotate(10 289 424)"/>

  <!-- Torso -->
  <rect x="195" y="255" width="95" height="100" rx="20" ry="20" fill="#0984e3"/>
  <!-- Shirt collar -->
  <polygon points="242,255 256,275 270,255" fill="#74b9ff"/>

  <!-- Left arm (raised holding bag) -->
  <line x1="195" y1="275" x2="130" y2="230" stroke="#f4a261" stroke-width="18" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="125" cy="225" r="14" fill="#f4a261"/>

  <!-- Right arm (relaxed down) -->
  <line x1="290" y1="275" x2="320" y2="330" stroke="#f4a261" stroke-width="18" stroke-linecap="round"/>
  <circle cx="324" cy="336" r="14" fill="#f4a261"/>

  <!-- Neck -->
  <rect x="236" y="225" width="28" height="32" rx="10" fill="#f4a261"/>

  <!-- Head -->
  <ellipse cx="250" cy="200" rx="52" ry="56" fill="#f4a261"/>

  <!-- Hair -->
  <ellipse cx="250" cy="152" rx="50" ry="22" fill="#2d3436"/>
  <ellipse cx="205" cy="170" rx="18" ry="26" fill="#2d3436"/>
  <ellipse cx="295" cy="170" rx="18" ry="26" fill="#2d3436"/>

  <!-- Eyes -->
  <ellipse cx="232" cy="198" rx="9" ry="10" fill="white"/>
  <ellipse cx="268" cy="198" rx="9" ry="10" fill="white"/>
  <circle cx="234" cy="200" r="5" fill="#2d3436"/>
  <circle cx="270" cy="200" r="5" fill="#2d3436"/>
  <!-- Eye shine -->
  <circle cx="236" cy="197" r="2" fill="white"/>
  <circle cx="272" cy="197" r="2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M222 186 Q232 181 242 186" stroke="#2d3436" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M258 186 Q268 181 278 186" stroke="#2d3436" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Big smile -->
  <path d="M232 218 Q250 234 268 218" stroke="#2d3436" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ── Shopping Bag ── -->
  <!-- Bag body -->
  <rect x="60" y="220" width="80" height="90" rx="12" fill="#00d4aa"/>
  <!-- Bag shine -->
  <rect x="68" y="228" width="18" height="50" rx="6" fill="white" opacity="0.2"/>
  <!-- Bag straps -->
  <path d="M80 220 Q85 195 95 195 Q105 195 110 220" stroke="#00b894" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Bag top fold -->
  <rect x="60" y="220" width="80" height="14" rx="8" fill="#00b894"/>
  <!-- Dollar sign on bag -->
  <text x="100" y="280" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="white" text-anchor="middle" opacity="0.9">$</text>

  <!-- ── BGT text at bottom ── -->
  <text x="256" y="478" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#00d4aa" text-anchor="middle" letter-spacing="6">BGT</text>
</svg>
