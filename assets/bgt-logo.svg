<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="skinFace" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#fad4a6"/>
      <stop offset="60%" stop-color="#f0b07a"/>
      <stop offset="100%" stop-color="#d4854a"/>
    </radialGradient>
    <radialGradient id="skinArm" cx="30%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#f5c28a"/>
      <stop offset="100%" stop-color="#c97840"/>
    </radialGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fa9f5"/>
      <stop offset="40%" stop-color="#1a7dc4"/>
      <stop offset="100%" stop-color="#0d5a94"/>
    </linearGradient>
    <linearGradient id="shirtHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pantGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c4a7c"/>
      <stop offset="100%" stop-color="#182d52"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2de0b0"/>
      <stop offset="50%" stop-color="#10b885"/>
      <stop offset="100%" stop-color="#067a59"/>
    </linearGradient>
    <radialGradient id="eyeWhite" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0dce8"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6b3d1e"/>
      <stop offset="60%" stop-color="#3d2010"/>
      <stop offset="100%" stop-color="#1a0a04"/>
    </radialGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerShadow">
      <feFlood flood-color="#000" flood-opacity="0.3" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="in" result="mask"/>
      <feGaussianBlur in="mask" stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Subtle floor gradient -->
  <ellipse cx="256" cy="448" rx="180" ry="28" fill="#000" opacity="0.3"/>
  <ellipse cx="256" cy="450" rx="140" ry="18" fill="#000" opacity="0.2"/>

  <!-- ════ PANTS / LOWER BODY ════ -->
  <path d="M196 348 Q188 388 184 428 Q196 435 212 430 Q222 398 228 365Z" fill="url(#pantGrad)"/>
  <path d="M280 348 Q288 388 292 428 Q304 435 320 430 Q310 398 304 365Z" fill="url(#pantGrad)"/>
  <!-- Pant shading -->
  <path d="M196 348 Q191 385 188 415" stroke="#0f1e3a" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M280 348 Q285 385 288 415" stroke="#0f1e3a" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Belt -->
  <rect x="192" y="340" width="136" height="14" rx="4" fill="#1a1a2e"/>
  <rect x="248" y="338" width="20" height="18" rx="3" fill="#c0a020"/>
  <rect x="251" y="341" width="14" height="12" rx="2" fill="#f0d060"/>

  <!-- ════ SHOES ════ -->
  <!-- Left shoe -->
  <path d="M178 426 Q170 430 164 428 Q155 432 158 440 Q168 446 196 442 Q208 438 210 432 Q204 428 190 428Z" fill="#1a1a2e"/>
  <path d="M162 436 Q170 432 185 434" stroke="#2d2d4e" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Right shoe -->
  <path d="M298 428 Q304 426 316 428 Q325 432 322 440 Q312 446 284 442 Q272 438 270 432 Q276 428 292 428Z" fill="#1a1a2e"/>
  <path d="M318 436 Q310 432 295 434" stroke="#2d2d4e" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- ════ SHIRT / TORSO ════ -->
  <path d="M188 270 Q180 310 180 348 Q216 360 256 358 Q296 360 332 348 Q332 310 324 270 Q296 252 256 250 Q216 252 188 270Z" fill="url(#shirtGrad)" filter="url(#dropShadow)"/>
  <!-- Shirt highlight -->
  <path d="M196 268 Q190 295 191 325" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.18"/>
  <!-- Shirt fold lines (fabric realism) -->
  <path d="M210 300 Q230 305 240 320" stroke="#0d5a94" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M302 300 Q282 305 272 320" stroke="#0d5a94" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- V-neck collar -->
  <path d="M236 258 L256 285 L276 258 Q268 250 256 250 Q244 250 236 258Z" fill="#1a7dc4"/>
  <path d="M240 258 L256 278 L272 258" stroke="#3fa9f5" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- ════ ARMS ════ -->
  <!-- Left arm upper (going toward bag) -->
  <path d="M188 282 Q162 270 138 258" stroke="url(#skinArm)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Left arm lower -->
  <path d="M140 260 Q122 252 108 244" stroke="url(#skinArm)" stroke-width="26" fill="none" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <path d="M324 282 Q348 300 358 330" stroke="url(#skinArm)" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Shirt sleeve cuffs -->
  <path d="M185 288 Q175 282 165 276" stroke="#1a7dc4" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M326 286 Q336 298 342 312" stroke="#1a7dc4" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ════ HANDS ════ -->
  <!-- Left hand (holding bag) -->
  <ellipse cx="100" cy="242" rx="19" ry="16" fill="url(#skinFace)" transform="rotate(-20 100 242)"/>
  <!-- Fingers hint -->
  <path d="M86 238 Q92 232 100 234 Q108 232 114 238" stroke="#c97840" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M86 242 Q92 248 100 246 Q108 248 114 242" stroke="#c97840" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Right hand -->
  <ellipse cx="362" cy="338" rx="18" ry="16" fill="url(#skinFace)" transform="rotate(15 362 338)"/>
  <path d="M350 334 Q356 328 364 330 Q372 328 376 334" stroke="#c97840" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ════ NECK ════ -->
  <path d="M234 234 L234 255 Q245 260 256 260 Q267 260 278 255 L278 234 Q267 228 256 228 Q245 228 234 234Z" fill="url(#skinFace)"/>
  <!-- Neck shadow -->
  <path d="M234 250 Q256 258 278 250" stroke="#d4854a" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- ════ HEAD ════ -->
  <!-- Head cast shadow -->
  <ellipse cx="260" cy="182" rx="80" ry="84" fill="#a05020" opacity="0.25" transform="translate(5,8)"/>
  <!-- Main head shape -->
  <path d="M178 176 Q178 100 256 96 Q334 100 334 176 Q334 234 310 248 Q284 260 256 260 Q228 260 202 248 Q178 234 178 176Z" fill="url(#skinFace)" filter="url(#dropShadow)"/>
  <!-- Jaw definition -->
  <path d="M205 240 Q256 262 307 240" stroke="#d4854a" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Temple shadow -->
  <ellipse cx="195" cy="190" rx="22" ry="40" fill="#c07030" opacity="0.15"/>
  <ellipse cx="317" cy="190" rx="22" ry="40" fill="#c07030" opacity="0.15"/>
  <!-- Cheek highlight -->
  <ellipse cx="222" cy="210" rx="18" ry="12" fill="white" opacity="0.12"/>
  <ellipse cx="290" cy="210" rx="18" ry="12" fill="white" opacity="0.12"/>
  <!-- Cheek blush -->
  <ellipse cx="208" cy="208" rx="22" ry="14" fill="#e8704a" opacity="0.22"/>
  <ellipse cx="304" cy="208" rx="22" ry="14" fill="#e8704a" opacity="0.22"/>

  <!-- ════ HAIR ════ -->
  <!-- Hair shadow/volume -->
  <path d="M184 164 Q186 90 256 86 Q326 90 328 164 Q320 118 256 114 Q192 118 184 164Z" fill="#2a1508"/>
  <!-- Hair top shape -->
  <path d="M184 168 Q184 92 256 88 Q328 92 328 168" fill="#3d1e0a"/>
  <!-- Hair highlight -->
  <path d="M220 100 Q244 92 268 98" stroke="#6b3518" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M214 112 Q230 105 248 108" stroke="#7a4020" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Side hair -->
  <path d="M184 160 Q180 185 184 205" stroke="#2a1508" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M328 160 Q332 185 328 205" stroke="#2a1508" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- ════ EARS ════ -->
  <path d="M178 178 Q168 184 168 196 Q168 208 178 214 Q184 210 186 196 Q184 182 178 178Z" fill="url(#skinFace)"/>
  <path d="M174 188 Q170 196 174 204" stroke="#c07030" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M334 178 Q344 184 344 196 Q344 208 334 214 Q328 210 326 196 Q328 182 334 178Z" fill="url(#skinFace)"/>
  <path d="M338 188 Q342 196 338 204" stroke="#c07030" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- ════ EYEBROWS ════ -->
  <path d="M204 158 Q220 150 238 155" stroke="#2a1508" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M274 155 Q292 150 308 158" stroke="#2a1508" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Brow highlight -->
  <path d="M205 156 Q220 149 237 153" stroke="#5a3015" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ════ EYES ════ -->
  <!-- Eye sockets (subtle shadow) -->
  <ellipse cx="224" cy="183" rx="24" ry="22" fill="#c07030" opacity="0.12"/>
  <ellipse cx="288" cy="183" rx="24" ry="22" fill="#c07030" opacity="0.12"/>
  <!-- Eye whites -->
  <ellipse cx="224" cy="182" rx="21" ry="20" fill="url(#eyeWhite)"/>
  <ellipse cx="288" cy="182" rx="21" ry="20" fill="url(#eyeWhite)"/>
  <!-- Upper eyelid shadow -->
  <path d="M204 172 Q224 164 244 172" fill="#f0b07a" opacity="0.35"/>
  <path d="M268 172 Q288 164 308 172" fill="#f0b07a" opacity="0.35"/>
  <!-- Irises -->
  <circle cx="224" cy="184" r="14" fill="url(#irisGrad)"/>
  <circle cx="288" cy="184" r="14" fill="url(#irisGrad)"/>
  <!-- Iris detail ring -->
  <circle cx="224" cy="184" r="10" fill="none" stroke="#5a3015" stroke-width="2" opacity="0.5"/>
  <circle cx="288" cy="184" r="10" fill="none" stroke="#5a3015" stroke-width="2" opacity="0.5"/>
  <!-- Pupils -->
  <circle cx="225" cy="185" r="8" fill="#050200"/>
  <circle cx="289" cy="185" r="8" fill="#050200"/>
  <!-- Main shine -->
  <circle cx="218" cy="177" r="5.5" fill="white" opacity="0.9"/>
  <circle cx="282" cy="177" r="5.5" fill="white" opacity="0.9"/>
  <!-- Secondary shine -->
  <circle cx="228" cy="186" r="2.5" fill="white" opacity="0.55"/>
  <circle cx="292" cy="186" r="2.5" fill="white" opacity="0.55"/>
  <!-- Eyelashes top -->
  <path d="M203 170 Q224 162 245 170" stroke="#1a0800" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M267 170 Q288 162 309 170" stroke="#1a0800" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Lower lash line -->
  <path d="M205 194 Q224 200 243 194" stroke="#3d2010" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M269 194 Q288 200 307 194" stroke="#3d2010" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ════ NOSE ════ -->
  <path d="M248 192 Q244 210 248 218 Q256 224 264 218 Q268 210 264 192" fill="#d4854a" opacity="0.5"/>
  <circle cx="249" cy="216" r="5.5" fill="#b86030" opacity="0.5"/>
  <circle cx="263" cy="216" r="5.5" fill="#b86030" opacity="0.5"/>
  <!-- Nose bridge highlight -->
  <path d="M252 195 Q254 207 252 215" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- ════ MOUTH / SMILE ════ -->
  <path d="M216 230 Q236 248 256 250 Q276 248 296 230" stroke="#2a0e00" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M221 232 Q256 252 291 232 Q276 244 256 246 Q236 244 221 232Z" fill="white" opacity="0.92"/>
  <!-- Teeth line -->
  <line x1="256" y1="233" x2="256" y2="245" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <!-- Smile dimples -->
  <circle cx="212" cy="228" r="5" fill="#c07030" opacity="0.3"/>
  <circle cx="300" cy="228" r="5" fill="#c07030" opacity="0.3"/>

  <!-- ════ SHOPPING BAG ════ -->
  <!-- Bag shadow on ground -->
  <ellipse cx="80" cy="316" rx="50" ry="12" fill="#000" opacity="0.3" transform="translate(5,8)"/>
  <!-- Bag shadow shape -->
  <rect x="42" y="210" width="96" height="108" rx="14" fill="#000" opacity="0.25" transform="translate(6,8)"/>
  <!-- Bag body -->
  <rect x="40" y="208" width="96" height="108" rx="14" fill="url(#bagGrad)" filter="url(#dropShadow)"/>
  <!-- Bag left face shadow (3D effect) -->
  <rect x="40" y="208" width="20" height="108" rx="14" fill="#000" opacity="0.15"/>
  <!-- Bag bottom shadow -->
  <rect x="40" y="290" width="96" height="26" rx="8" fill="#000" opacity="0.15"/>
  <!-- Bag crease/fold -->
  <line x1="88" y1="214" x2="88" y2="310" stroke="#067a59" stroke-width="2" opacity="0.5"/>
  <!-- Bag shine streak -->
  <rect x="52" y="220" width="16" height="65" rx="8" fill="white" opacity="0.2"/>
  <rect x="56" y="222" width="6" height="55" rx="3" fill="white" opacity="0.15"/>
  <!-- Bag top fold -->
  <rect x="40" y="202" width="96" height="20" rx="10" fill="#10b885"/>
  <!-- Fold crease line -->
  <line x1="88" y1="202" x2="88" y2="222" stroke="#067a59" stroke-width="2" opacity="0.4"/>
  <!-- Handles -->
  <path d="M62 202 Q66 168 80 164 Q94 168 98 202" stroke="#067a59" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M62 202 Q66 168 80 164 Q94 168 98 202" stroke="#2de0b0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Dollar sign -->
  <text x="88" y="282" font-family="Georgia, serif" font-weight="bold" font-size="42" fill="white" text-anchor="middle" opacity="0.92" filter="url(#dropShadow)">$</text>
  <!-- Dollar sign shine -->
  <text x="86" y="280" font-family="Georgia, serif" font-weight="bold" font-size="42" fill="white" text-anchor="middle" opacity="0.15">$</text>

  <!-- ════ GLOW RING ════ -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00d4aa" stroke-width="5" opacity="0.55" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.25"/>

  <!-- ════ BGT TEXT ════ -->
  <text x="256" y="484" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#00d4aa" text-anchor="middle" letter-spacing="10" filter="url(#softGlow)">BGT</text>
  <!-- Text underline -->
  <line x1="175" y1="490" x2="337" y2="490" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
</svg>
