<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Bag Guy</title>
  <meta name="description" content="Create your Bag Guy account and start saving."/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#102019;--muted:#66766f;--bg:#f5faf7;--card:#fff;--green:#0aae63;--green2:#087246;--line:#dce9e2;--danger:#b42318;--shadow:0 22px 60px rgba(16,54,36,.12)}
    body{background:radial-gradient(circle at 14% 0%,rgba(10,174,99,.15),transparent 30%),linear-gradient(180deg,#fbfdfb,var(--bg));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
    nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;border-bottom:1px solid rgba(220,233,226,.9);background:rgba(251,253,251,.92);backdrop-filter:blur(16px);gap:16px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:10px;color:var(--ink);font-size:1.2rem;font-weight:950;text-decoration:none}
    .logo::before{content:"✓";width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#071d15,var(--green) 76%,#7cf2b0);display:grid;place-items:center;color:#fff;box-shadow:0 12px 26px rgba(10,174,99,.22)}
    .nav-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .nav-right a{color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600}
    .nav-right a:hover{color:var(--ink)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .auth-card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:28px;padding:38px 34px;box-shadow:var(--shadow)}
    .auth-card h1{font-size:2rem;font-weight:950;letter-spacing:-.04em;line-height:1;margin-bottom:10px;text-align:center}
    .auth-card h1 span{color:var(--green)}
    .auth-card .sub{color:var(--muted);font-size:.9rem;text-align:center;margin-bottom:28px}
    form{display:flex;flex-direction:column;gap:14px}
    label{font-size:.78rem;color:var(--muted);font-weight:850;letter-spacing:.05em;text-transform:uppercase}
    input{width:100%;background:#fbfdfb;border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:14px;font-size:.95rem;font-family:inherit;transition:border-color .2s,box-shadow .2s}
    input:focus{outline:none;border-color:#9be7bb;box-shadow:0 0 0 4px rgba(10,174,99,.11)}
    .hint{font-size:.75rem;color:var(--muted);margin-top:4px}
    .btn-primary{background:var(--green);color:#fff;padding:14px 24px;border-radius:15px;text-decoration:none;font-weight:950;font-size:.95rem;border:none;cursor:pointer;transition:opacity .2s,transform .2s;margin-top:6px;box-shadow:0 14px 30px rgba(10,174,99,.22)}
    .btn-primary:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.55;cursor:not-allowed}
    .msg{font-size:.85rem;padding:10px 12px;border-radius:8px;display:none}
    .msg.error{display:block;background:#fff0ef;border:1px solid #f0b7b2;color:var(--danger)}
    .auth-footer{margin-top:22px;text-align:center;color:var(--muted);font-size:.85rem}
    .auth-footer a{color:var(--green2);text-decoration:none;font-weight:850}
    .auth-footer a:hover{text-decoration:underline}
    footer{padding:28px 24px;text-align:center;color:var(--muted);font-size:.78rem;border-top:1px solid var(--line);background:#fff}
    footer a{color:var(--muted);text-decoration:none;margin:0 10px}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">Bag Guy</a>
  <div class="nav-right">
    <a href="/login.html">Log in</a>
    <a href="/">Home</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <h1>Create your <span>account</span></h1>
    <p class="sub">Start stacking coupons and saving on every run.</p>

    <div id="msg" class="msg"></div>

    <form id="signupForm" novalidate>
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required placeholder="Benton"/>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com"/>
      </div>
      <div>
        <label for="zip">ZIP Code</label>
        <input type="text" id="zip" name="zip" autocomplete="postal-code" inputmode="numeric" required placeholder="29501"/>
        <div class="hint">Used to find nearby deals and weekly ads.</div>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters"/>
        <div class="hint">Minimum 8 characters.</div>
      </div>
      <div>
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required placeholder="••••••••"/>
      </div>
      <button type="submit" id="submitBtn" class="btn-primary">Create account</button>
    </form>

    <p class="auth-footer">Already have one? <a href="/login.html">Log in</a></p>
  </div>
</main>

<footer>
  <p>
    <a href="mailto:hello@bagguyapp.com">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </p>
</footer>

<script src="/assets/auth.js"></script>
<script>
(() => {
  if (BagGuyAuth.isLoggedIn()) { location.href = '/dashboard.html'; return; }
  const form = document.getElementById('signupForm');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');

  function showError(text){ msg.textContent = text; msg.className = 'msg error'; }
  function clearError(){ msg.textContent = ''; msg.className = 'msg'; }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const zip = document.getElementById('zip').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    if (!name) return showError('Enter your name.');
    if (!zip) return showError('Enter your ZIP code so Bag Guy can find nearby deals.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    if (password !== confirm) return showError('Passwords do not match.');

    btn.disabled = true; btn.textContent = 'Creating…';
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('source') || 'direct';
    try {
      const r = await fetch(BagGuyAuth.API + '/auth/signup', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ name, email, password, zip_code: zip, source }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(BagGuyAuth.errorText(data, 'Could not create your account. Check your details and try again.'));
      const session = BagGuyAuth.setSession(data);

      // If a plan was specified, redirect to Stripe Checkout
      const planParam = new URLSearchParams(window.location.search).get('plan');
      if (planParam && ['silver','gold','platinum'].includes(planParam)) {
        btn.textContent = 'Setting up billing…';
        try {
          const cr = await fetch(BagGuyAuth.API + '/billing/checkout', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + session.token
            },
            body: JSON.stringify({ plan: planParam })
          });
          const cd = await cr.json().catch(() => ({}));
          if (cr.ok && cd.url) {
            window.location.href = cd.url;
            return;
          }
        } catch (_) {}
        // If checkout fails, fall through to rewards
      }
      location.href = '/rewards.html';
    } catch (err) {
      showError(err.message || 'Could not create your account. Check your details and try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create account';
    }
  });
})();
</script>
</body>
</html>
